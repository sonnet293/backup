<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>코드 작성 · 코드 백업소</title>
<script>document.documentElement.style.visibility = "hidden";</script>
<link rel="stylesheet" href="css/style.css" />
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
<link id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet" />
</head>
<body>

<div class="page">

  <div class="topbar">
    <a class="back-link" id="back-link" href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      폴더로 돌아가기
    </a>
  </div>

  <div class="editor-shell">
    <div class="editor-fields">
      <div class="field field-filename">
        <label for="filename-input">파일 경로 / 이름</label>
        <input type="text" id="filename-input" placeholder="예: js/main.js, index.html, css/style.css" autocomplete="off" />
      </div>
      <div class="field">
        <label for="language-select">언어</label>
        <select id="language-select">
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="json">JSON</option>
          <option value="other">기타</option>
        </select>
      </div>
    </div>

    <div id="editor-container"></div>

    <div class="editor-footer">
      <span class="editor-hint" id="editor-status">새 파일 작성 중</span>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-ghost" id="cancel-btn">취소</button>
        <button class="btn btn-primary" id="save-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          저장
        </button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

<!-- highlight.js (Quill 코드 하이라이팅용) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<!-- Quill -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

<script src="js/quill.js"></script>
</body>
</html>
