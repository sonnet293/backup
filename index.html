<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>코드 백업소</title>
<script>document.documentElement.style.visibility = "hidden";</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="page">

  <div class="topbar">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h6l2 2h8q.825 0 1.413.588T22 8v10q0 .825-.587 1.413T20 20z"/></svg>
      <span>코드 백업소</span>
    </div>

    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="폴더 검색..." autocomplete="off" />
    </div>

    <button class="btn btn-primary" id="new-folder-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      새 폴더
    </button>

    <button class="btn btn-ghost" id="logout-btn" title="로그아웃">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </div>

  <div class="folder-grid" id="folder-grid">
    <!-- 폴더 카드들이 js/main.js에 의해 여기에 렌더링됩니다 -->
  </div>

  <div class="empty-state" id="empty-state" style="display:none">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h6l2 2h8q.825 0 1.413.588T22 8v10q0 .825-.587 1.413T20 20z"/></svg>
    <div id="empty-text">아직 백업한 프로젝트가 없어요. 새 폴더를 만들어보세요.</div>
  </div>

</div>

<!-- 새 폴더 생성 모달 -->
<div class="modal-overlay" id="folder-modal-overlay">
  <div class="modal">
    <h3>새 폴더 만들기</h3>
    <input type="text" id="folder-name-input" placeholder="폴더 이름 (예: 포트폴리오 사이트)" maxlength="60" />
    <div class="modal-actions">
      <button class="btn btn-ghost" id="folder-modal-cancel">취소</button>
      <button class="btn btn-primary" id="folder-modal-confirm">만들기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
