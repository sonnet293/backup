<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>미리보기 · 코드 백업소</title>
<script>document.documentElement.style.visibility = "hidden";</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="viewer-bar">
  <div class="viewer-path">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M0 0h24v24H0z" fill="none"/><path fill="currentColor" d="M4 20q-.825 0-1.412-.587T2 18V6q0-.825.588-1.412T4 4h6l2 2h8q.825 0 1.413.588T22 8v10q0 .825-.587 1.413T20 20z"/></svg>
    <span id="path-text">불러오는 중...</span>
  </div>
  <div class="viewer-actions">
    <a class="btn btn-sm" id="back-to-folder" href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      돌아가기
    </a>
    <button class="btn btn-sm" id="reload-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      새로고침
    </button>
  </div>
</div>

<iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups" style="display:none"></iframe>
<div class="viewer-empty" id="viewer-empty" style="display:none">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
  <div id="viewer-empty-text">미리보기를 불러올 수 없어요.</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>

<script src="js/viewer.js"></script>
</body>
</html>
